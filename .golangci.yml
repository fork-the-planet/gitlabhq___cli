version: "2"

run:
    modules-download-mode: readonly

linters:
    default: none
    enable:
        - asasalint
        - asciicheck
        - bidichk
        - bodyclose
        - contextcheck
        - copyloopvar
        - depguard
        - dupword
        - errcheck
        - errorlint
        - exptostd
        - fatcontext
        - forbidigo
        - forcetypeassert
        - gocheckcompilerdirectives
        - gochecksumtype
        - gomoddirectives
        - govet
        - ineffassign
        - makezero
        - mirror
        - misspell
        - modernize
        - nilerr
        - nilnesserr
        - nolintlint
        - nonamedreturns
        - nosprintfhostport
        - reassign
        - staticcheck
        - testifylint
        - unconvert
        - unparam
        - unused
        - usetesting
        - thelper
        - tparallel
    exclusions:
      presets:
          - comments
          - common-false-positives
          - legacy
          - std-error-handling
      rules:
        - path: _test\.go
          linters:
            - dupword
            - forbidigo
        - path-except: internal/commands/
          linters:
            - forbidigo
          text: "stdout and stderr output"
    settings:
      forbidigo:
        forbid:
          - pattern: ^json\.Marshal(Indent)?$
            msg: "Use IOStreams.PrintJSON for stdout output. For non-stdout serialization (request bodies, disk, protocols), add //nolint:forbidigo with a reason."
          - pattern: ^json\.NewEncoder$
            msg: "Use IOStreams.PrintJSON for stdout output. For non-stdout serialization (request bodies, disk, protocols), add //nolint:forbidigo with a reason."
          - pattern: ^fmt\.F(print|printf|println|scan|scanf|scanln)$
            msg: "Use IOStreams LogInfo, LogInfof, Error, and Errorf for stdout and stderr output."
      govet:
        enable-all: true
        disable:
          - fieldalignment
          - shadow
      modernize:
        disable:
          - omitzero
      staticcheck:
        checks:
          - all
          - -QF*
          - -ST1003
          - -ST1008
          - -ST1012
          - -ST1016
          - -ST1018
          - -ST1023
      depguard:
        rules:
          cmdutils-only-in-commands:
            files:
              - "**/*.go"
              - "!**/cmd/glab/*.go"
              - "!**/cmd/gen-docs/*.go"
              - "!**/internal/testing/cmdtest/*.go"
              - "!**/internal/cmdutils/*_test.go"
              - "!**/internal/commands/*.go"
              - "!**/internal/commands/**/*.go"
            deny:
              - pkg: "gitlab.com/gitlab-org/cli/internal/cmdutils"
                desc: "internal/cmdutils should only be imported from packages under internal/commands/"

          no-testing-in-production:
            files:
              - "!$test"
            deny:
              - pkg: "gitlab.com/gitlab-org/cli/internal/testing/**"
                desc: "Testing utilities should only be used in test files"
      usetesting:
        context-background: true
        context-todo: true
        os-chdir: true
        os-mkdir-temp: true
        os-setenv: true
        os-create-temp: true
        os-temp-dir: true

formatters:
    enable:
        - gci
        - gofumpt
        - goimports
    settings:
      gci:
        sections:
          - standard
          - default
          - prefix(gitlab.com/gitlab-org/api)
          - localmodule
